<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEYA Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #E0DEDA; }
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.163.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
camera.position.z = 6;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const l1 = new THREE.DirectionalLight(0xffe8ff, 2.2);
l1.position.set(-3, 4, 5);
scene.add(l1);
const l2 = new THREE.DirectionalLight(0xaac4ff, 1.4);
l2.position.set(4, -2, -2);
scene.add(l2);
const l3 = new THREE.DirectionalLight(0xffddee, 0.8);
l3.position.set(2, 3, 4);
scene.add(l3);

// Load wand
const loader = new THREE.GLTFLoader();
let wand = null;
let t = 0; // animation progress 0→1
let done = false;

// Mouse
let mx = 0, my = 0;
let px = 0, py = 0;
document.addEventListener('mousemove', e => {
  mx = (e.clientX / W - 0.5) * 2;
  my = (e.clientY / H - 0.5) * 2;
});

loader.load(
  'https://raw.githubusercontent.com/svidronovak-dot/feya-studio/main/feya-wand-v2.glb',
  (gltf) => {
    wand = gltf.scene;

    // Scale to fit
    const box = new THREE.Box3().setFromObject(wand);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    wand.position.sub(center);
    wand.scale.setScalar(3.0 / Math.max(size.x, size.y, size.z));

    // Start off screen top-left
    wand.position.set(-6, 5, 0);
    wand.rotation.set(-1.2, 0.9, 1.4);

    scene.add(wand);
  },
  undefined,
  e => console.error(e)
);

// Easing
function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
function easeOutBack(t) {
  return 1 + 2.3 * Math.pow(t - 1, 3) + 1.3 * Math.pow(t - 1, 2);
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (wand) {
    if (!done) {
      t = Math.min(t + dt / 1.1, 1);
      const p = easeOutQuint(t);
      const r = easeOutBack(Math.min(t * 1.05, 1));

      // Position: top-left → center
      wand.position.x = -6 + 6 * p;
      wand.position.y = 5 - 5 * p;
      wand.position.z = 0;

      // Rotation: swing into final baked pose (0,0,0)
      wand.rotation.x = -1.2 * (1 - r);
      wand.rotation.y =  0.9 * (1 - r);
      wand.rotation.z =  1.4 * (1 - r);

      if (t >= 1) done = true;

    } else {
      // Settled — only mouse parallax
      px += (mx * 0.05 - px) * 0.04;
      py += (-my * 0.04 - py) * 0.04;
      wand.rotation.x = py * 0.15;
      wand.rotation.y = px * 0.15;
      wand.position.x = px * 0.08;
      wand.position.y = py * 0.06;
    }
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
